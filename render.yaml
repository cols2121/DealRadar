services:
  - type: web
    name: dealradar-feedback
    env: python
    buildCommand: pip install -e .
    startCommand: uvicorn digest.feedback_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: /var/data/dealradar.db
    disk:
      name: dealradar-db
      mountPath: /var/data
      sizeGB: 1
