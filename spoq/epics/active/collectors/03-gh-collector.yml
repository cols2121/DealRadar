description: |
  ## Objective

  GitHub surfaces technical founders early — a new repo gaining stars or a new org formed by ex-scaleup engineers is a strong pre-seed signal.

  ## GraphQL query pattern

  ```graphql
  query($cursor: String) {
    search(query: "created:>2026-03-13 stars:>5 language:Python OR language:TypeScript", type: REPOSITORY, first: 100, after: $cursor) {
      pageInfo { hasNextPage endCursor }
      nodes {
        ... on Repository {
          name nameWithOwner stargazerCount createdAt
          owner {
            login
            ... on User { location bio }
            ... on Organization { location description }
          }
          homepageUrl description
        }
      }
    }
  }
  ```

  ## Implementation sketch

  ```python
  # collectors/gh.py
  import os, time
  from datetime import date, timedelta
  import httpx
  from store import Store
  from collectors.eu_locations import is_eu_location

  GQL_URL = "https://api.github.com/graphql"
  EX_SCALEUP = ["monzo","revolut","wise","spotify","deliveroo","delivery hero",
                "transferwise","babylon","checkout.com","starling","freetrade"]
  MIN_VELOCITY = 2  # stars per week minimum

  def _gql(query, variables=None):
      headers = {"Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}"}
      for attempt in range(3):
          try:
              r = httpx.post(GQL_URL, json={"query": query, "variables": variables or {}},
                             headers=headers, timeout=15)
              r.raise_for_status()
              data = r.json()
              if "errors" in data:
                  raise ValueError(data["errors"])
              return data["data"]
          except Exception as e:
              if attempt == 2: raise
              time.sleep(2 ** attempt)

  def collect():
      store = Store(); store.init_db()
      since = (date.today() - timedelta(days=90)).strftime("%Y-%m-%d")
