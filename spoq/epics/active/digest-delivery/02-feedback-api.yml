description: |
  ## Implementation

  ```python
  # digest/feedback_api.py
  import json, urllib.parse
  from fastapi import FastAPI, Request, Response
  from store import Store

  app = FastAPI()

  @app.post("/slack/actions")
  async def slack_actions(request: Request):
      body = await request.body()
      payload = json.loads(urllib.parse.unquote(body.decode().removeprefix("payload=")))
      for action in payload.get("actions", []):
          value = action.get("value", "")
          if "::" in value:
              signal, entity_key = value.split("::", 1)
              user_id = payload.get("user", {}).get("id", "unknown")
              Store().insert_feedback(entity_key, user_id, signal)
      return {"ok": True}

  @app.get("/health")
  async def health():
      return {"status": "ok"}
  ```

  ## Render deployment

  - Connect GitHub repo to Render
  - Build command: `pip install -e .`
  - Start command: `uvicorn digest.feedback_api:app --host 0.0.0.0 --port $PORT`
  - Set env var: `DATABASE_URL` pointing to a persistent volume path (or use Render's disk)
  - Copy the Render HTTPS URL to `FEEDBACK_ENDPOINT` env var in GitHub Actions secrets
