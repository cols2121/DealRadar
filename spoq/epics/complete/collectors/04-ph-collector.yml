description: |
  ## Objective

  Product Hunt surfaces EU founders who have shipped an MVP — a strong "working product" signal aligned with the thesis must_have criteria.

  ## API

  Product Hunt public GraphQL API (no auth required for public data):
  `POST https://api.producthunt.com/v2/api/graphql`

  ```graphql
  query {
    posts(order: NEWEST, after: "2026-06-04") {
      edges {
        node {
          id slug name tagline url
          makers { name profileUrl websiteUrl twitterUsername }
          votesCount commentsCount createdAt
        }
      }
    }
  }
  ```

  Filter: at least one maker with `is_eu_location(maker.websiteUrl or maker.twitterUsername or bio)`.
