acceptance_criteria:
  - "[ ] `python -m dealradar.run` completes full pipeline end-to-end"
  - "[ ] Run report footer in Slack message shows: entities scanned, cost £, sources live/failed"
  - "[ ] Any exception in run.py triggers send_alert() before re-raising"
  - "[ ] Exit code 0 on success, non-zero on failure (for GitHub Actions)"
