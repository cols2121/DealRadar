id: 06-run-report
title: Add run report footer and failure alerting to daily pipeline
epic: digest-delivery
status: completed
priority: high
phase: 2

estimate:
  optimistic: 30m
  realistic: 1h
  pessimistic: 2h

dependencies:
  - 03-slack-sender

skills_required:
  - python

files_to_touch:
  - dealradar/run.py

outputs:
  - RunReport aggregated across all collectors appended to digest footer
  - Failure alert to personal Slack DM on any unhandled exception in run.py
