description: |
  ## Objective

  Define the swappable thesis configuration that drives LLM scoring and is injected verbatim into the scoring prompt.

  ## thesis.yaml

  ```yaml
  thesis:
    stage: "pre-seed (pre-revenue OK, raising <= £2m)"
    geography:
      - UK
      - Europe
    must_have:
      - technical founder
      - working product
    bonus:
      - ex-scaleup senior engineer
      - second-time founder
      - deep tech
    exclude:
      - agencies
      - consultancies
      - crypto tokens
      - already raised seed+
    notes: >
      Focus on companies that would benefit from institutional pre-seed capital.
      Early signals matter more than traction at this stage.
  ```

  ## thesis_model.py

  ```python
  from pydantic import BaseModel
  from pathlib import Path
  import yaml

  class ThesisConfig(BaseModel):
      stage: str
      geography: list[str]
      must_have: list[str]
      bonus: list[str]
      exclude: list[str]
      notes: str = ""

  def load_thesis(path: Path = Path("config/thesis.yaml")) -> ThesisConfig:
      data = yaml.safe_load(path.read_text())
      return ThesisConfig(**data["thesis"])
  ```

  ## Verification

  ```bash
  python -c "from config.thesis_model import load_thesis; t = load_thesis(); assert t.stage.startswith('pre-seed'); print('OK')"
  ```
